name: Update Now Widget

on:
  schedule:
    - cron: "*/15 15-23 * * *"
    - cron: "*/15 0-4 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  TZ: America/Phoenix

jobs:
  update-now:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Pick daytime update slot
        id: update-slot
        env:
          SPOTIFY_UPDATE_RANDOM_SEED: ${{ secrets.SPOTIFY_UPDATE_RANDOM_SEED }}
        run: python3 scripts/should_update_now.py

      - name: Refresh Spotify data
        if: steps.update-slot.outputs.should_run == 'true'
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
          SPOTIFY_TOP_TIME_RANGE: short_term
        run: python3 scripts/update_now.py

      - name: Commit updated data
        if: steps.update-slot.outputs.should_run == 'true'
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "${{ secrets.GH_COMMIT_NAME }}"
          git config user.email "${{ secrets.GH_COMMIT_EMAIL }}"
          git add data/now.json
          git commit -m "Update Now widget data"
          git push origin "HEAD:${GITHUB_REF#refs/heads/}"
