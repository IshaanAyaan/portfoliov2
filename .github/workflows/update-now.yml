name: Update Now Widget

on:
  schedule:
    - cron: "*/15 15-23 * * *"
    - cron: "*/15 0-4 * * *"
  workflow_dispatch:

permissions: {}

env:
  TZ: America/Phoenix

jobs:
  update-now:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Pick daytime update slot
        id: update-slot
        env:
          SPOTIFY_UPDATE_RANDOM_SEED: ${{ secrets.SPOTIFY_UPDATE_RANDOM_SEED }}
        run: python3 scripts/should_update_now.py

      - name: Refresh Spotify data
        if: steps.update-slot.outputs.should_run == 'true'
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
          SPOTIFY_TOP_TIME_RANGE: short_term
        run: python3 scripts/update_now.py

      - name: Commit updated data
        if: steps.update-slot.outputs.should_run == 'true'
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/now.json
          git commit -m "Update Now widget data"
          git push origin "HEAD:${GITHUB_REF#refs/heads/}"
