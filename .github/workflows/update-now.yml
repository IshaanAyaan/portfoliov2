name: Update Now Widget

on:
  schedule:
    - cron: "0 1,7,13,19 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-now:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Refresh Spotify data
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
          SPOTIFY_TOP_TIME_RANGE: short_term
        run: python3 scripts/update_now.py

      - name: Commit updated data
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "${{ secrets.GH_COMMIT_NAME }}"
          git config user.email "${{ secrets.GH_COMMIT_EMAIL }}"
          git add data/now.json
          git commit -m "Update Now widget data"
          git push origin "HEAD:${GITHUB_REF#refs/heads/}"
